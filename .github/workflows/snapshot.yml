name: Snapshot

# Regenerates the static data snapshot on a schedule (for static-JSON deploys).
# GitHub's scheduled-workflow minimum is ~5 min and runs can be delayed; the
# committed JSON also adds repo churn — lower the interval or push the snapshot
# to a CDN/Blob instead if that matters to you.
on:
  # Refreshes public/data/snapshot.json for the static deploy. The frontend reads
  # this file straight from GitHub's CDN (raw.githubusercontent.com), and the
  # commit step carries [skip ci] so Netlify does NOT rebuild for data updates.
  # The repo is public, so Actions minutes are free/unlimited; 5 min is GitHub's
  # scheduled minimum (runs can still be delayed a few minutes under load).
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    # Safety net: a healthy run is ~2-3 min. Fail fast instead of hanging for
    # hours (and blocking the concurrency group) if a feed/process ever stalls.
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate snapshot
        run: npm run snapshot
        env:
          GOOGLE_NEWS: "off"
          RSS_TIMEOUT_MS: "8000"
      - name: Publish snapshot to the data branch
        run: |
          git config user.name "pak-monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          # Build a PARENTLESS commit holding only snapshot.json and force-push it
          # to the data branch. No parent + force-push means that branch always has
          # exactly one commit, so 5-min refreshes never grow the repo history.
          # main is never touched. [skip ci] keeps other workflows from running.
          blob=$(git hash-object -w public/data/snapshot.json)
          tree=$(printf '100644 blob %s\tsnapshot.json\n' "$blob" | git mktree)
          commit=$(git commit-tree "$tree" -m "data: refresh snapshot [skip ci]")
          git push -f origin "$commit:refs/heads/data"
