[build]
  command = "npm run build"

# next.config sets output:"export", so `next build` emits a pure static site to
# out/. The Next runtime plugin detects export mode and publishes those static
# files with ZERO serverless functions — nothing runs on Netlify at request time.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Build-time public env (inlined into the static bundle). No functions exist, so
# there is nothing to configure at runtime.
[build.environment]
  NEXT_PUBLIC_DATA_SOURCE   = "static"
  NEXT_PUBLIC_REALTIME      = "poll"
  # Read the data snapshot straight from GitHub's CDN. The snapshot is refreshed
  # by a GitHub Action and committed with [skip ci], so Netlify never rebuilds
  # for data — only for code changes.
  NEXT_PUBLIC_SNAPSHOT_URL  = "https://raw.githubusercontent.com/murtazabali/pak-monitor/main/public/data/snapshot.json"
