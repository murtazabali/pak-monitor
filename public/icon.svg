<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Pak Monitor">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1320"/>
      <stop offset="1" stop-color="#05070b"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7df0fb"/>
      <stop offset="0.55" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="ping" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <mask id="crescent">
      <rect width="32" height="32" fill="black"/>
      <circle cx="14" cy="16" r="10" fill="white"/>
      <circle cx="18.6" cy="13" r="8.6" fill="black"/>
    </mask>
  </defs>

  <!-- command-center backdrop -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#22d3ee" stroke-opacity="0.18"/>

  <!-- Pakistan crescent -->
  <rect width="32" height="32" fill="url(#moon)" mask="url(#crescent)"/>

  <!-- live signal ping (realtime monitor) -->
  <circle cx="23" cy="13" r="4.6" fill="url(#ping)"/>
  <circle cx="23" cy="13" r="2.1" fill="#34d399"/>
  <circle cx="22.4" cy="12.4" r="0.7" fill="#ecfdf5" fill-opacity="0.9"/>
</svg>
